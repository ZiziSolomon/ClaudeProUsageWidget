<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Usage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1c1c1e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f5f5f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 24px;
  }

  h1 {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
  }

  /* ---- three widgets ---- */
  .widgets {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    justify-content: center;
  }

  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 120px;
  }

  .widget-title {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666;
  }

  /* ghost icon */
  .ghost-wrap {
    position: relative;
    width: 121px;
    height: 76px;
  }

  .ghost-wrap svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .ghost-filled {
    clip-path: inset(var(--clip-top, 100%) 0 0 0);
    transition: clip-path 0.5s ease;
  }

  /* arc widget */
  .arc-wrap svg {
    display: block;
  }

  #arc-text {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 18px;
    font-weight: 700;
    fill: #fff;
  }

  .pct-label {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .pct-label.weekly { color: #F5A623; }

  .sub-label {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 0.04em;
  }

  /* ---- sections ---- */
  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    /* clickable collapse header */
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  .section-title:hover { color: #888; }

  /* chevron: points down when open, right when collapsed */
  .section-title::after {
    content: "";
    width: 0;
    height: 0;
    border-left: 4px solid currentColor;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transform: rotate(90deg);
    transition: transform 0.15s;
  }

  .section.collapsed .section-title::after {
    transform: rotate(0deg);
  }

  .section-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .section.collapsed .section-body { display: none; }

  /* ---- toggle buttons ---- */
  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .toggle-btn {
    background: #2a2a2c;
    border: 1px solid transparent;
    color: #555;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }

  .toggle-btn:hover {
    background: #333;
    color: #888;
  }

  .toggle-btn.on {
    background: #2A78D6;
    color: #fff;
  }

  .toggle-btn.on:hover {
    background: #3a88e6;
  }

  .action-btn {
    background: #2a2a2c;
    border: 1px solid transparent;
    color: #aaa;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }

  .action-btn:hover {
    background: #333;
    color: #eee;
  }

  .action-btn:active {
    background: #444;
  }

  /* ---- settings rows ---- */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .setting-label {
    font-size: 0.75rem;
    color: #888;
  }

  .setting-input {
    background: #2a2a2c;
    border: 1px solid #3a3a3c;
    color: #eee;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.75rem;
    font-family: inherit;
    outline: none;
    width: 110px;
  }

  .setting-input.narrow { width: 56px; }

  .setting-input:focus { border-color: #555; }

  /* ---- accuracy chart ---- */
  .chart-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .session-select {
    background: #2a2a2c;
    border: 1px solid #3a3a3c;
    color: #aaa;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.75rem;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }

  .session-select:focus {
    border-color: #555;
  }

  #chart-img {
    max-width: min(680px, 90vw);
    border-radius: 6px;
    display: none;
  }
</style>
</head>
<body>

<h1>Claude Usage</h1>

<div class="widgets">

  <!-- Session ghost -->
  <div class="widget">
    <div class="widget-title">Session</div>
    <div class="ghost-wrap">
      <svg class="ghost-outline" viewBox="0 0 121 76" xmlns="http://www.w3.org/2000/svg">
        <path fill="#363635" fill-rule="evenodd"
          d="M 17,36 L 17,48 L 29,48 L 29,59 L 35,59 L 35,71 L 41,71 L 41,59 L 47,59
             L 47,71 L 53,71 L 53,59 L 77,59 L 77,71 L 83,71 L 83,59 L 89,59 L 89,71
             L 95,71 L 95,59 L 101,59 L 101,48 L 113,48 L 113,36 L 101,36 L 101,13
             L 29,13 L 29,36 Z
             M 41,25 L 41,36 L 47,36 L 47,25 Z
             M 83,25 L 83,36 L 89,36 L 89,25 Z"/>
      </svg>
      <svg class="ghost-filled" id="sess-fill" viewBox="0 0 121 76" xmlns="http://www.w3.org/2000/svg">
        <path id="sess-fill-path" fill="#2A78D6" fill-rule="evenodd"
          d="M 17,36 L 17,48 L 29,48 L 29,59 L 35,59 L 35,71 L 41,71 L 41,59 L 47,59
             L 47,71 L 53,71 L 53,59 L 77,59 L 77,71 L 83,71 L 83,59 L 89,59 L 89,71
             L 95,71 L 95,59 L 101,59 L 101,48 L 113,48 L 113,36 L 101,36 L 101,13
             L 29,13 L 29,36 Z
             M 41,25 L 41,36 L 47,36 L 47,25 Z
             M 83,25 L 83,36 L 89,36 L 89,25 Z"/>
      </svg>
    </div>
    <div class="pct-label" id="sess-pct">—%</div>
    <div class="sub-label" id="sess-when">session</div>
  </div>

  <!-- Weekly ghost -->
  <div class="widget">
    <div class="widget-title">Weekly</div>
    <div class="ghost-wrap">
      <svg class="ghost-outline" viewBox="0 0 121 76" xmlns="http://www.w3.org/2000/svg">
        <path fill="#363635" fill-rule="evenodd"
          d="M 17,36 L 17,48 L 29,48 L 29,59 L 35,59 L 35,71 L 41,71 L 41,59 L 47,59
             L 47,71 L 53,71 L 53,59 L 77,59 L 77,71 L 83,71 L 83,59 L 89,59 L 89,71
             L 95,71 L 95,59 L 101,59 L 101,48 L 113,48 L 113,36 L 101,36 L 101,13
             L 29,13 L 29,36 Z
             M 41,25 L 41,36 L 47,36 L 47,25 Z
             M 83,25 L 83,36 L 89,36 L 89,25 Z"/>
      </svg>
      <svg class="ghost-filled" id="week-fill" viewBox="0 0 121 76" xmlns="http://www.w3.org/2000/svg">
        <path id="week-fill-path" fill="#F5A623" fill-rule="evenodd"
          d="M 17,36 L 17,48 L 29,48 L 29,59 L 35,59 L 35,71 L 41,71 L 41,59 L 47,59
             L 47,71 L 53,71 L 53,59 L 77,59 L 77,71 L 83,71 L 83,59 L 89,59 L 89,71
             L 95,71 L 95,59 L 101,59 L 101,48 L 113,48 L 113,36 L 101,36 L 101,13
             L 29,13 L 29,36 Z
             M 41,25 L 41,36 L 47,36 L 47,25 Z
             M 83,25 L 83,36 L 89,36 L 89,25 Z"/>
      </svg>
    </div>
    <div class="pct-label weekly" id="week-pct">—%</div>
    <div class="sub-label" id="week-when">weekly</div>
  </div>

  <!-- Session clock -->
  <div class="widget">
    <div class="widget-title">Session clock</div>
    <div class="arc-wrap">
      <svg width="121" height="121" viewBox="0 0 121 121">
        <circle id="arc-track" cx="60.5" cy="60.5" r="54"
                fill="rgba(54,54,53,0.55)"/>
        <path id="arc-fill" d="" fill="#2A78D6"/>
        <text id="arc-text" x="60.5" y="60.5"
              text-anchor="middle" dominant-baseline="central">--</text>
      </svg>
    </div>
    <div class="sub-label" id="arc-sub">time left</div>
  </div>

</div>

<div class="section" data-section="taskbar">
  <div class="section-title">Show in taskbar</div>
  <div class="section-body">
    <div class="toggles">
      <button class="toggle-btn" data-key="show_session_ghost">Session ghost</button>
      <button class="toggle-btn" data-key="show_weekly_ghost">Weekly ghost</button>
      <button class="toggle-btn" data-key="show_session_pct">Session %</button>
      <button class="toggle-btn" data-key="show_weekly_pct">Weekly %</button>
      <button class="toggle-btn" data-key="show_session_reset">Session clock</button>
    </div>
  </div>
</div>

<div class="section" data-section="settings">
  <div class="section-title">Settings</div>
  <div class="section-body">
    <div class="toggles">
      <button class="toggle-btn" data-key="start_at_login">Start at login</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Check usage every</span>
      <input type="number" id="poll-input" class="setting-input narrow" min="2" step="1"/>
      <span class="setting-label">min</span>
      <button class="action-btn" id="poll-save">Save</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Re-check at these % (one-shot)</span>
      <input type="text" id="oneshot-input" class="setting-input" placeholder="5,10,95"/>
      <button class="action-btn" id="oneshot-save">Save</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">…and after every</span>
      <input type="number" id="delta-input" class="setting-input narrow" min="1" step="1"/>
      <span class="setting-label">% moved</span>
      <button class="action-btn" id="delta-save">Save</button>
    </div>
  </div>
</div>

<div class="section" data-section="actions">
  <div class="section-title">Actions</div>
  <div class="section-body">
    <div class="toggles">
      <button class="action-btn" data-action="confirm">Confirm usage %</button>
      <button class="action-btn" data-action="open_config">Open config folder</button>
      <button class="action-btn" data-action="restart">Restart widget</button>
      <button class="action-btn" data-action="quit">Quit widget</button>
    </div>
  </div>
</div>

<div class="section" data-section="log">
  <div class="section-title">Widget log</div>
  <div class="section-body">
    <div class="chart-row">
      <select id="session-select" class="session-select">
        <option value="">Loading…</option>
      </select>
      <button class="action-btn" id="chart-btn">Generate</button>
    </div>
    <img id="chart-img" alt="Accuracy chart"/>
  </div>
</div>

<script>
  const sessFill = document.getElementById('sess-fill');
  const sessPath = document.getElementById('sess-fill-path');
  const weekFill = document.getElementById('week-fill');
  const weekPath = document.getElementById('week-fill-path');
  const sessPct  = document.getElementById('sess-pct');
  const sessWhen = document.getElementById('sess-when');
  const weekPct  = document.getElementById('week-pct');
  const weekWhen = document.getElementById('week-when');
  const arcFill  = document.getElementById('arc-fill');
  const arcText  = document.getElementById('arc-text');
  const arcSub   = document.getElementById('arc-sub');

  function setGhost(fillEl, pathEl, pct, alertColor) {
    fillEl.style.setProperty('--clip-top', (100 - pct) + '%');
    const alert = pct >= 90;
    pathEl.setAttribute('fill', alert ? '#D64E2A' : alertColor);
  }

  function fmtWhen(iso, label) {
    if (!iso) return label;
    const mins = Math.round((new Date(iso) - Date.now()) / 60000);
    if (mins <= 0)  return 'resetting…';
    if (mins < 60)  return `in ${mins}m`;
    const h = Math.floor(mins / 60), m = mins % 60;
    if (h < 24)    return m > 0 ? `in ${h}h ${m}m` : `in ${h}h`;
    const d = Math.floor(h / 24), rh = h % 24;
    return rh > 0 ? `in ${d}d ${rh}h` : `in ${d}d`;
  }

  function fmtArcLabel(remainMs) {
    const mins = Math.round(remainMs / 60000);
    if (mins <= 0)  return '0m';
    if (mins < 60)  return `${mins}m`;
    const h = Math.floor(mins / 60), m = mins % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  function updateArc(sessionStart, sessionEnd) {
    const cx = 60.5, cy = 60.5, r = 54;
    if (!sessionStart || !sessionEnd) {
      arcFill.setAttribute('d', '');
      arcText.textContent = '--';
      arcSub.textContent  = 'time left';
      return;
    }
    const now   = Date.now();
    const start = new Date(sessionStart).getTime();
    const end   = new Date(sessionEnd).getTime();
    if (now >= end) {
      arcFill.setAttribute('d', '');
      arcText.textContent = '--';
      arcSub.textContent  = 'resetting…';
      return;
    }
    const total    = end - start;
    const used     = now - start;
    const progress = Math.max(0, Math.min(1, used / total));
    const remain   = Math.max(0, end - now);

    if (progress <= 0) {
      arcFill.setAttribute('d', '');
    } else if (progress >= 0.9999) {
      arcFill.setAttribute('d',
        `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.001} ${cy - r} Z`);
    } else {
      const a1 = -Math.PI / 2;
      const a2 = a1 + 2 * Math.PI * progress;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      const large = progress > 0.5 ? 1 : 0;
      arcFill.setAttribute('d',
        `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`);
    }
    const alert = remain / total <= 0.10;
    arcFill.setAttribute('fill', alert ? '#D64E2A' : '#2A78D6');
    arcText.textContent = fmtArcLabel(remain);
    arcSub.textContent  = 'time left';
  }

  // ---- prefs / toggle buttons ----

  async function refreshPrefs() {
    try {
      const p = await fetch('/prefs?t=' + Date.now()).then(r => r.json());
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        const key = btn.dataset.key;
        btn.classList.toggle('on', !!p[key]);
      });
      // Prefill the numeric setting inputs, but never overwrite a field the
      // user is actively editing (refreshPrefs runs on a timer).
      const poll = document.getElementById('poll-input');
      if (document.activeElement !== poll && p.poll_interval_minutes != null) {
        poll.value = p.poll_interval_minutes;
      }
      const oneshot = document.getElementById('oneshot-input');
      if (document.activeElement !== oneshot && Array.isArray(p.liveness_oneshot_pcts)) {
        oneshot.value = p.liveness_oneshot_pcts.join(',');
      }
      const delta = document.getElementById('delta-input');
      if (document.activeElement !== delta && p.liveness_delta_pct != null) {
        delta.value = p.liveness_delta_pct;
      }
    } catch { /* server blip */ }
  }

  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch('/toggle?key=' + btn.dataset.key, { method: 'POST' });
      await refreshPrefs();
    });
  });

  async function saveSetting(url, btn) {
    const orig = btn.textContent;
    const res = await fetch(url, { method: 'POST' }).then(r => r.json()).catch(() => ({}));
    btn.textContent = res.ok ? 'Saved' : 'Invalid';
    btn.blur();
    await refreshPrefs();
    setTimeout(() => { btn.textContent = orig; }, 1200);
  }

  document.getElementById('poll-save').addEventListener('click', () => {
    const v = document.getElementById('poll-input').value.trim();
    saveSetting('/set_poll?minutes=' + encodeURIComponent(v),
                document.getElementById('poll-save'));
  });

  document.getElementById('oneshot-save').addEventListener('click', () => {
    const v = document.getElementById('oneshot-input').value.trim();
    saveSetting('/set_liveness_pcts?pcts=' + encodeURIComponent(v),
                document.getElementById('oneshot-save'));
  });

  document.getElementById('delta-save').addEventListener('click', () => {
    const v = document.getElementById('delta-input').value.trim();
    saveSetting('/set_liveness_delta?pct=' + encodeURIComponent(v),
                document.getElementById('delta-save'));
  });

  // Only real action buttons carry data-action; the Save buttons reuse the
  // .action-btn look but must not fire a stray /action?name=undefined.
  document.querySelectorAll('.action-btn[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      fetch('/action?name=' + btn.dataset.action, { method: 'POST' });
    });
  });

  // ---- collapsible sections ----
  // Each section's header toggles its body; state persists in localStorage.
  // Default is open for everything except Settings (kept closed to declutter).
  document.querySelectorAll('.section').forEach(sec => {
    const id    = sec.dataset.section;
    const title = sec.querySelector('.section-title');
    const saved = localStorage.getItem('section:' + id);
    const collapsed = saved === null ? (id === 'settings') : (saved === '1');
    sec.classList.toggle('collapsed', collapsed);
    title.addEventListener('click', () => {
      const nowCollapsed = !sec.classList.contains('collapsed');
      sec.classList.toggle('collapsed', nowCollapsed);
      localStorage.setItem('section:' + id, nowCollapsed ? '1' : '0');
    });
  });

  // ---- state polling ----

  async function refresh() {
    try {
      const s = await fetch('/state?t=' + Date.now()).then(r => r.json());
      const expired = s.session_end && new Date(s.session_end) < Date.now();
      const sPct = expired ? 0 : (s.session_pct ?? 0);
      const wPct = s.weekly_pct ?? 0;

      setGhost(sessFill, sessPath, sPct, '#2A78D6');
      sessPct.textContent  = Math.round(sPct) + '%';
      sessWhen.textContent = fmtWhen(s.session_end, 'session');

      setGhost(weekFill, weekPath, wPct, '#F5A623');
      weekPct.textContent  = Math.round(wPct) + '%';
      weekWhen.textContent = fmtWhen(s.weekly_end, 'weekly');

      updateArc(s.session_start, s.session_end);
    } catch { /* server not up yet */ }
  }

  refresh();
  refreshPrefs();
  setInterval(refresh, 4000);
  setInterval(refreshPrefs, 8000);

  // ---- accuracy chart ----

  async function refreshSessions() {
    try {
      const sessions = await fetch('/sessions?t=' + Date.now()).then(r => r.json());
      const sel = document.getElementById('session-select');
      if (!sessions.length) {
        sel.innerHTML = '<option value="">No sessions on file</option>';
        return;
      }
      sel.innerHTML = sessions.map((s, i) =>
        `<option value="${s.at}">${s.label}${i === 0 ? ' (latest)' : ''}</option>`
      ).join('');
    } catch { /* server blip */ }
  }

  document.getElementById('chart-btn').addEventListener('click', async () => {
    const btn  = document.getElementById('chart-btn');
    const at   = document.getElementById('session-select').value;
    const img  = document.getElementById('chart-img');
    btn.textContent = 'Generating…';
    btn.disabled = true;
    try {
      const res = await fetch('/chart' + (at ? '?at=' + encodeURIComponent(at) : ''), { method: 'POST' });
      const { ok } = await res.json();
      if (ok) {
        img.src = '/chart_image?t=' + Date.now();
        img.style.display = 'block';
      } else {
        btn.textContent = 'Error — check console';
        return;
      }
    } catch {
      btn.textContent = 'Error';
      return;
    } finally {
      setTimeout(() => {
        btn.textContent = 'Generate';
        btn.disabled = false;
      }, 1500);
    }
  });

  refreshSessions();
</script>
</body>
</html>
